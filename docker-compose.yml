version: "3.9"

services:

  # ── Ollama LLM server ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: meeting_summariser_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Pull required models on first run ──────────────────────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    container_name: meeting_summariser_ollama_setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        ollama pull llama3.2 &&
        ollama pull nomic-embed-text &&
        echo 'Models ready.'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── Meeting Summariser app ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting_summariser_app
    ports:
      - "7860:7860"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - app_data:/app/data          # persists SQLite DB, ChromaDB, transcripts
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=llama3.2
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - WHISPER_MODEL_SIZE=small
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - DB_PATH=/app/data/meetings.db
      - CHROMA_PATH=/app/data/chroma
      - TRANSCRIPT_DIR=/app/data/transcripts
      - APP_HOST=0.0.0.0
      - APP_PORT=7860
      # Set your HF token here or pass via .env file
      - HF_TOKEN=${HF_TOKEN}
    restart: unless-stopped


volumes:
  ollama_data:
  app_data: